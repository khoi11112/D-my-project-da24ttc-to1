<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>
body{
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

.form-box{
    width:600px;
    margin:40px auto;
    padding:20px;
    background:#1c1c1c;
    border-radius:10px;
}

h2{
    text-align:center;
    color:#ff0000;
}

.form-row{
    display:flex;
    gap:10px;
}

.form-group{
    flex:1;
}

label{
    display:block;
    margin-top:10px;
}

input, select, textarea{
    width:100%;
    padding:7px;
    margin-top:4px;
    border:none;
    border-radius:5px;
    background:#2a2a2a;
    color:white;
}

input:focus, select:focus, textarea:focus{
    outline:none;
    border:1px solid red;
}

textarea{
    height:70px;
}

.button-group{
    text-align:center;
    margin-top:15px;
}

button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
}

button[type="submit"]{
    background:red;
    color:white;
}

button[type="reset"]{
    background:#444;
    color:white;
}

/* mobile */
@media(max-width:768px){
    .form-row{
        flex-direction:column;
    }
}
</style>

</head>

<body>

<div class="form-box">
<h2>Form Đăng Ký</h2>

<form>

<div class="form-row">
    <div class="form-group">
        <label>SĐT</label>
        <input type="tel" required>
    </div>

    <div class="form-group">
        <label>Địa chỉ</label>
        <input type="text" required>
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Họ tên</label>
        <input type="text" required>
    </div>

    <div class="form-group">
        <label>MSSV</label>
        <input type="text" required>
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Lớp</label>
        <select>
            <option>DA24TTC</option>
        </select>
    </div>

    <div class="form-group">
        <label>Giới tính</label>
        <input type="text">
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Ngày sinh</label>
        <input type="date">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email">
    </div>
</div>

<label>Điểm mạnh</label>
<textarea></textarea>

<label>Hình ảnh</label>
<input type="file">

<div class="button-group">
    <button type="submit">Đăng ký</button>
    <button type="reset">Nhập lại</button>
</div>

</form>
</div>

</body>
</html>
