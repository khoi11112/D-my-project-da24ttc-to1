<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="../css/style6.css">
    <style>
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }
        .detail-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }
        .detail-card h2 {
            margin-top: 0;
        }
        .detail-card img {
            width: 100%;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 24px;
        }
        .detail-card ul {
            padding-left: 20px;
            margin-top: 0;
        }
        .detail-card ul li {
            margin-bottom: 10px;
        }
        .detail-card p {
            line-height: 1.75;
            color: #555;
        }
        .detail-card .btn {
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chi tiết sản phẩm</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            Thông tin chi tiết rõ ràng về sản phẩm ảnh để bạn dễ xem và lựa chọn.
        </p>

        <div id="detail-content"></div>
    </div>
    <script src="../js/lib.js"></script>
</body>
</html>
