<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thư viện ảnh</title>
    <link rel="stylesheet" href="../css/style6.css">
</head>
<body>
    <div class="page">
        <header class="hero">
            <h1>Thư viện ảnh</h1>
            <p>Trang web hiển thị các hình ảnh đẹp từ bộ sưu tập của bạn.</p>
            <div class="cart-info">
                <span>Giỏ hàng: <span id="cart-count">0</span> sản phẩm</span>
                <button class="view-cart-btn" onclick="viewCart()">Xem giỏ hàng</button>
                <button class="clear-cart-btn" onclick="clearCart()">Xóa giỏ hàng</button>
            </div>
        </header>

        <main class="gallery" id="gallery">
            <!-- Gallery items sẽ được tạo bởi renderGallery() -->
        </main>

        <section class="price-table">
            <h2>Bảng Giá Chi Tiết</h2>
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên Sản Phẩm</th>
                        <th>Giá (VNĐ)</th>
                        <th>Mô Tả</th>
                    </tr>
                </thead>
                <tbody id="price-table-body">
                    <!-- Bảng giá sẽ được tạo bởi renderPriceTable() -->
                </tbody>
            </table>
        </section>

        <footer class="footer">
            <div class="nav-links">
                <a class="btn" href="../index.html">← Trang chủ</a>
                <a class="btn" href="page1.html">Trang 1</a>
                <a class="btn" href="page2.html">Trang 2</a>
                <a class="btn" href="page3.html">Trang 3</a>
                <a class="btn" href="page4.html">Trang 4</a>
                <a class="btn" href="page5.html">Trang 5</a>
            </div>
        </footer>
    </div>
    <script src="../js/lib.js"></script>
</body>
</html>
