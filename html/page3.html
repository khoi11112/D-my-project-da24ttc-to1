<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>
<link rel="stylesheet" href="../css/style3.css">
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}

.form-box{
    width:400px;
    margin:50px auto;
    padding:20px;
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

label{
    display:block;
    margin-top:10px;
}

input, select, textarea{
    width:100%;
    padding:6px;
    margin-top:4px;
}

.button-group{
    margin-top:15px;
    text-align:center;
}

button{
    padding:8px 15px;
    margin:5px;
}
</style>
</head>

<body>

<div class="form-box">

<h2>Form Đăng Ký Sinh Viên</h2>

<form>

<label>Số điện thoại</label>
<input type="tel" name="sdt">

<label>Địa chỉ</label>
<input type="text" name="diachi">

<label>Họ tên</label>
<input type="text" name="hoten">

<label>MSSV</label>
<input type="text" name="mssv">

<label>Lớp</label>
<select name="lop">
<option>--Chọn lớp--</option>
<option>DTH21</option>
<option>DTH22</option>
<option>DTH23</option>
</select>

<label>Giới tính</label>
<input type="text" name="gioitinh">

<label>Ngày sinh</label>
<input type="date" name="ngaysinh">

<label>Điểm mạnh</label>
<textarea></textarea>

<label>Hình ảnh</label>
<input type="file">

<label>Email</label>
<input type="email" name="email">

<div class="button-group">
<button type="submit">Đăng ký</button>
<button type="reset">Nhập lại</button>
</div>

</form>

</div>

</body>
</html>
